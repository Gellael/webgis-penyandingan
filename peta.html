<!doctype html>
<html lang="id">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
        /* Mengatur kanvas peta penuh */
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: 'Poppins', sans-serif !important;
            background-color: #e5e5e5;
        }

        /* CUSTOM UI: Tombol Beranda & Judul Melayang */
        .ui-floating {
            position: absolute;
            top: 20px;
            left: 60px; /* Jarak aman dari tombol zoom Leaflet */
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            color: #2c3e50;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-back:hover, .btn-back:active {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .map-title {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            color: #2c3e50;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-left: 5px solid #e74c3c;
            letter-spacing: 0.5px;
        }

        /* CUSTOM UI: Pop-up & Legenda */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            font-family: 'Poppins', sans-serif;
        }
        
        .leaflet-popup-content { 
            margin: 15px; 
            line-height: 1.6; 
            max-width: 280px; /* Mencegah popup terlalu lebar */
        }
        
        .btn-gmaps {
            background: #3498db;
            color: white !important;
            padding: 10px 12px; /* Area sentuh diperbesar agar mudah diklik jempol */
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            transition: background 0.3s;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .btn-gmaps:hover, .btn-gmaps:active { 
            background: #2980b9; 
        }

        .leaflet-control-layers {
            border: none !important;
            border-radius: 12px !important;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2) !important;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(5px);
            padding: 5px;
        }

        /* ====================================================
           MEDIA QUERIES (Mobile Responsive)
           ==================================================== */
        @media (max-width: 600px) {
            .ui-floating { 
                top: 12px; 
                left: 50px; /* Menyesuaikan dengan tombol zoom di kiri */
                gap: 10px; 
            }
            .btn-back {
                padding: 8px 15px;
                font-size: 13px;
            }
            .map-title { 
                display: none; /* Sembunyikan judul di layar kecil agar tidak sesak */
            }
            .leaflet-popup-content { 
                max-width: 220px; /* Popup lebih ramping di HP */
            }
            .leaflet-control-attribution {
                font-size: 9px !important; /* Mengecilkan teks copyright di kanan bawah */
                max-width: 200px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            /* Memperbesar area sentuh ikon layer/legenda di HP */
            .leaflet-control-layers-toggle {
                width: 44px;
                height: 44px;
            }
        }
        </style>
        <title>WebGIS Desa Penyandingan</title>
    </head>
    <body>
        
        <div class="ui-floating">
            <a href="index.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Beranda
            </a>
            <div class="map-title">Peta Interaktif Desa Penyandingan</div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        
        <script src="data/garis_desa_3.js"></script>
        <script src="data/POIPointofInterest_4.js"></script>
        <script src="data/JalanSekitarDesaPenyandingan_5.js"></script>
        
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-4.7182583922343735,103.28391944295674],[-4.707403064048001,103.30059281782914]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> · <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a>');
        
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {}

        map.createPane('pane_OSMStandard_0');
        map.getPane('pane_OSMStandard_0').style.zIndex = 400;
        var layer_OSMStandard_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { pane: 'pane_OSMStandard_0', opacity: 1.0, attribution: '© OpenStreetMap', minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 19 });
        map.addLayer(layer_OSMStandard_0);

        map.createPane('pane_GoogleHybrid_1');
        map.getPane('pane_GoogleHybrid_1').style.zIndex = 401;
        var layer_GoogleHybrid_1 = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { pane: 'pane_GoogleHybrid_1', opacity: 1.0, attribution: '© Google', minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 20 });
        map.addLayer(layer_GoogleHybrid_1);

        map.createPane('pane_GoogleSatellite_2');
        map.getPane('pane_GoogleSatellite_2').style.zIndex = 402;
        var layer_GoogleSatellite_2 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { pane: 'pane_GoogleSatellite_2', opacity: 1.0, attribution: '© Google', minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 20 });
        map.addLayer(layer_GoogleSatellite_2);

        var maskHoles = [];
        json_garis_desa_3.features.forEach(function(feat) {
            var coords = feat.geometry.coordinates;
            if (feat.geometry.type === 'Polygon') {
                var hole = coords[0].map(function(c) { return [c[1], c[0]]; }); 
                maskHoles.push(hole);
            } else if (feat.geometry.type === 'MultiPolygon') {
                coords.forEach(function(polygon) {
                    var hole = polygon[0].map(function(c) { return [c[1], c[0]]; });
                    maskHoles.push(hole);
                });
            }
        });

        var worldBounds = [ [-90, -180], [90, -180], [90, 180], [-90, 180], [-90, -180] ];
        var maskCoordinates = [worldBounds];
        maskHoles.forEach(function(hole) { maskCoordinates.push(hole); });

        map.createPane('pane_EfekGelap');
        map.getPane('pane_EfekGelap').style.zIndex = 402; 
        var layer_EfekGelap = L.polygon(maskCoordinates, {
            pane: 'pane_EfekGelap',
            color: 'transparent',
            fillColor: '#000000',
            fillOpacity: 0.6, 
            interactive: false 
        });
        map.addLayer(layer_EfekGelap); 

        function pop_garis_desa_3(feature, layer) {
            var popupContent = '<table><tr><td colspan="2" style="font-size:13px;"><strong>Batas Desa Penyandingan</strong></td></tr></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_garis_desa_3_0() {
            return { pane: 'pane_garis_desa_3', opacity: 1, color: 'rgba(231,76,60,1.0)', dashArray: '', lineCap: 'butt', lineJoin: 'miter', weight: 4.0, fillOpacity: 0, interactive: true, }
        }
        map.createPane('pane_garis_desa_3');
        map.getPane('pane_garis_desa_3').style.zIndex = 403;
        var layer_garis_desa_3 = new L.geoJson(json_garis_desa_3, { attribution: '', interactive: true, dataVar: 'json_garis_desa_3', layerName: 'layer_garis_desa_3', pane: 'pane_garis_desa_3', onEachFeature: pop_garis_desa_3, style: style_garis_desa_3_0, });
        bounds_group.addLayer(layer_garis_desa_3);
        map.addLayer(layer_garis_desa_3);

        function pop_POIPointofInterest_4(feature, layer) {
            var lat = feature.geometry.coordinates[1];
            var lng = feature.geometry.coordinates[0];
            var gmapsLink = 'https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lng;
            var namaLokasi = feature.properties['Nama'] !== null ? String(feature.properties['Nama']) : 'Fasilitas Desa';
            var popupContent = '<div style="text-align:center;">' +
                               '<h4 style="margin:0 0 5px 0; color:#2c3e50; font-size:15px;">' + namaLokasi + '</h4>' +
                               '<p style="margin:0 0 10px 0; font-size:11px; color:#7f8c8d;">Lokasi Penting / Fasilitas Umum</p>' +
                               '<a href="' + gmapsLink + '" target="_blank" class="btn-gmaps">' +
                               '<i class="fa-solid fa-location-arrow"></i> Buka Rute di Gmaps</a></div>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_POIPointofInterest_4_0() {
            return { pane: 'pane_POIPointofInterest_4', radius: 8.0, opacity: 1, color: 'rgba(255,255,255,1.0)', weight: 2, fill: true, fillOpacity: 1, fillColor: 'rgba(52,152,219,1.0)', interactive: true, }
        }
        map.createPane('pane_POIPointofInterest_4');
        map.getPane('pane_POIPointofInterest_4').style.zIndex = 404;
        var layer_POIPointofInterest_4 = new L.geoJson(json_POIPointofInterest_4, { attribution: '', interactive: true, dataVar: 'json_POIPointofInterest_4', layerName: 'layer_POIPointofInterest_4', pane: 'pane_POIPointofInterest_4', onEachFeature: pop_POIPointofInterest_4, pointToLayer: function (feature, latlng) { return L.circleMarker(latlng, style_POIPointofInterest_4_0(feature)); }, });
        bounds_group.addLayer(layer_POIPointofInterest_4);
        map.addLayer(layer_POIPointofInterest_4);

        function pop_JalanSekitarDesaPenyandingan_5(feature, layer) {
            var popupContent = '<table><tr><td colspan="2" style="font-size:13px;"><strong>Akses Jalan Lingkungan</strong></td></tr></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_JalanSekitarDesaPenyandingan_5_0() {
            return { pane: 'pane_JalanSekitarDesaPenyandingan_5', opacity: 1, color: 'rgba(241,196,15,1.0)', weight: 3.0, fillOpacity: 0, interactive: false, }
        }
        map.createPane('pane_JalanSekitarDesaPenyandingan_5');
        map.getPane('pane_JalanSekitarDesaPenyandingan_5').style.zIndex = 405;
        var layer_JalanSekitarDesaPenyandingan_5 = new L.geoJson(json_JalanSekitarDesaPenyandingan_5, { attribution: '', interactive: false, dataVar: 'json_JalanSekitarDesaPenyandingan_5', layerName: 'layer_JalanSekitarDesaPenyandingan_5', pane: 'pane_JalanSekitarDesaPenyandingan_5', onEachFeature: pop_JalanSekitarDesaPenyandingan_5, style: style_JalanSekitarDesaPenyandingan_5_0, });
        bounds_group.addLayer(layer_JalanSekitarDesaPenyandingan_5);
        map.addLayer(layer_JalanSekitarDesaPenyandingan_5);

        var overlaysTree = [
            {label: '<b>Tampilan Visual</b>', selectAllCheckbox: true, children: [
                {label: 'Efek Fokus Desa (Gelap)', layer: layer_EfekGelap},
            ]},
            {label: '<b>Infrastruktur</b>', selectAllCheckbox: true, children: [
                {label: 'Jalan Desa', layer: layer_JalanSekitarDesaPenyandingan_5},
                {label: 'Titik Lokasi (POI)', layer: layer_POIPointofInterest_4},
                {label: 'Batas Wilayah', layer: layer_garis_desa_3},
            ]},
            {label: '<b>Peta Dasar</b>', selectAllCheckbox: true, children: [
                {label: "Satelit Resolusi Tinggi", layer: layer_GoogleSatellite_2},
                {label: "Satelit + Label", layer: layer_GoogleHybrid_1},
                {label: "Peta Jalan OSM", layer: layer_OSMStandard_0},
            ]}
        ]
        var lay = L.control.layers.tree(null, overlaysTree,{ collapsed: true });
        lay.addTo(map);
        setBounds();
        
        var i = 0;
        layer_POIPointofInterest_4.eachLayer(function(layer) {
            layer.bindTooltip((layer.feature.properties['Nama'] !== null?String('<div style="color: #2c3e50; font-weight: bold; background: white; padding: 3px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 10px; font-family: \'Poppins\', sans-serif;">' + layer.feature.properties['Nama']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_POIPointofInterest_4', direction: 'top'});
            labels.push(layer);
            i++;
        });
        resetLabels([layer_POIPointofInterest_4]);
        map.on("zoomend", function(){ resetLabels([layer_POIPointofInterest_4]); });
        map.on("layeradd", function(){ resetLabels([layer_POIPointofInterest_4]); });
        map.on("layerremove", function(){ resetLabels([layer_POIPointofInterest_4]); });
        </script>        
    </body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Informasi Desa Penyandingan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Gambar latar belakang dari Unsplash (bisa diganti URL-nya nanti) */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1596401057633-54a8fe8ef647?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        /* Efek Frosted Glass */
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 850px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        /* Desain Tombol/Kartu Menu */
        .card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px 20px;
            width: 220px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            border-color: #fff;
        }

        .card i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #4facfe;
            transition: all 0.3s ease;
        }

        .card:hover i {
            color: #00f2fe;
            transform: scale(1.1);
        }

        .card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .card span {
            font-size: 0.85rem;
            color: #dcdcdc;
        }

        .footer-text {
            margin-top: 45px;
            font-size: 0.9rem;
            color: #cccccc;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Desa Penyandingan</h1>
        <p>Pusat Layanan & Sistem Informasi Terpadu</p>
        
        <div class="card-grid">
            <a href="peta.html" class="card">
                <i class="fa-solid fa-map-location-dot"></i>
                <h3>Peta Digital</h3>
                <span>Jelajahi wilayah desa</span>
            </a>
            
            <a href="https://desa-penyandingan.vercel.app/" class="card" target="_blank">
                <i class="fa-solid fa-house-chimney"></i>
                <h3>Profil Desa</h3>
                <span>Informasi & potensi</span>
            </a>
            
            <a href="https://pengolahan-sampah.vercel.app/" class="card" target="_blank">
                <i class="fa-solid fa-recycle"></i>
                <h3>Lapor Sampah</h3>
                <span>Sistem pelaporan warga</span>
            </a>
        </div>

        <div class="footer-text">
            &copy; 2026 Dipersembahkan oleh Mahasiswa KKN Universitas Bengkulu
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Informasi Desa Penyandingan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Gambar latar belakang dengan overlay gelap agar teks mudah dibaca */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1596401057633-54a8fe8ef647?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            /* Pastikan background menempel utuh walau discroll di HP */
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px; /* Memberi jarak aman agar pinggiran tidak menempel di tepi HP */
        }

        /* Efek Frosted Glass Utama */
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Jarak antar kartu sedikit dirapatkan */
            justify-content: center;
        }

        /* Desain Kartu Menu */
        .card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px 20px;
            width: 220px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease; /* Transisi dipercepat sedikit agar responsif di HP */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover, .card:active {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            border-color: #fff;
        }

        .card i {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #4facfe;
            transition: all 0.3s ease;
        }

        .card:hover i, .card:active i {
            color: #00f2fe;
            transform: scale(1.1);
        }

        .card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .card span {
            font-size: 0.85rem;
            color: #dcdcdc;
            line-height: 1.4;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #cccccc;
            letter-spacing: 0.5px;
        }

        /* ====================================================
           MEDIA QUERIES (Agar Responsif di Layar Tablet & Mobile)
           ==================================================== */
        
        /* Untuk Tablet / Layar Menengah */
        @media (max-width: 768px) {
            .glass-container {
                padding: 40px 30px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .card {
                width: calc(50% - 15px); /* Kartu dibagi 2 kolom rata tengah */
            }
        }

        /* Untuk Smartphone / Layar Kecil */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .glass-container {
                padding: 35px 20px;
                border-radius: 15px;
            }
            h1 {
                font-size: 1.8rem;
                margin-bottom: 8px;
            }
            p {
                font-size: 0.95rem;
                margin-bottom: 30px;
            }
            .card-grid {
                flex-direction: column; /* Mengubah susunan kartu menjadi baris ke bawah */
                gap: 15px;
            }
            .card {
                width: 100%; /* Kartu memenuhi seluruh lebar layar HP */
                max-width: 300px; /* Diberi batas maksimal agar tidak terlalu melar */
                margin: 0 auto; /* Posisi di tengah */
                padding: 20px 15px;
                flex-direction: row; /* Ikon dan teks bersebelahan agar menghemat ruang */
                text-align: left;
                align-items: center;
            }
            .card i {
                font-size: 2rem;
                margin-bottom: 0;
                margin-right: 15px;
                width: 40px;
                text-align: center;
            }
            .card-content {
                display: flex;
                flex-direction: column;
            }
            .card h3 {
                font-size: 1.1rem;
                margin-bottom: 2px;
            }
            .card span {
                font-size: 0.8rem;
            }
            .footer-text {
                margin-top: 30px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Desa Penyandingan</h1>
        <p>Pusat Layanan & Sistem Informasi Terpadu</p>
        
        <div class="card-grid">
            <a href="peta.html" class="card">
                <i class="fa-solid fa-map-location-dot"></i>
                <div class="card-content">
                    <h3>Peta Digital</h3>
                    <span>Jelajahi wilayah desa</span>
                </div>
            </a>
            
            <a href="https://desa-penyandingan.vercel.app/" class="card" target="_blank">
                <i class="fa-solid fa-house-chimney"></i>
                <div class="card-content">
                    <h3>Profil Desa</h3>
                    <span>Informasi & potensi</span>
                </div>
            </a>
            
            <a href="https://pengolahan-sampah.vercel.app/" class="card" target="_blank">
                <i class="fa-solid fa-recycle"></i>
                <div class="card-content">
                    <h3>Lapor Sampah</h3>
                    <span>Sistem pelaporan warga</span>
                </div>
            </a>
        </div>

        <div class="footer-text">
            &copy; 2026 Dipersembahkan oleh Mahasiswa KKN Universitas Bengkulu
        </div>
    </div>

</body>
</html>
